<!DOCTYPE html>
<html>
<head>
    <title>Manohar Reddy</title>

    <style>
        body {
            text-align: center;
            color: #ffffff;
            background-color: blue; /* changed here */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
            margin: 20px auto;
            color: #ffeb3b;
            text-shadow: 2px 2px 5px black;
            border: 2px solid white;
            width: 350px;
            padding: 15px;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            max-width: 700px;
            margin: 15px auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>

    <script>
        function showUserInfo() {
            let name = prompt("Enter your name:");

            if (name !== null && name !== "") {
                alert("Hello " + name + "!");
                document.getElementById("demo").innerHTML =
                    "Hello " + name + "! Current date and time is: " + new Date();
            } else {
                alert("You did not enter a name.");
            }
        }
    </script>
</head>

<body>

    <h1>Manohar Reddy</h1>

    <p>
        Hello! My name is Manohar Reddy. I am learning HTML and creating my first simple webpage.
    </p>

    <button type="button" onclick="showUserInfo()">
        Click me
    </button>

    <p id="demo"></p>

    <p>
        <a href="https://github.com/manoharreddyms07-creator/sem4-fet" target="_blank">
            Return to home page
        </a>
    </p>

</body>
</html>
