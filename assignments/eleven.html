<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Layer Box Example</title>

 <style>

  .container{
   position: relative;
   cursor: crosshair;
  }

  .red-box{
   position: relative;
   z-index: 1;
   background: red;
   height: 500px;
   width: 200px;
   top: 10px;
   left: 50px;
   color: white;
   font-size: 25px;
   text-align: center;
   line-height: 500px;
  }

  .blue-box{
   position: absolute;
   z-index: 3;
   background: rgb(40, 80, 187);
   height: 500px;
   width: 200px;
   left: 120px;
   top: 10px;
   color: white;
   font-size: 25px;
   text-align: center;
   line-height: 500px;
  }

  .yellow-box{
   position: absolute;
   z-index: 4;
   background: rgb(255, 247, 24);
   height: 500px;
   width: 200px;
   left: 160px;
   top: 10px;
   color: black;
   font-size: 25px;
   text-align: center;
   line-height: 500px;
  }

  .green-box{
   position: absolute;
   z-index: 2;
   background: rgb(12, 240, 12);
   height: 500px;
   width: 200px;
   left: 80px;
   top: 10px;
   color: white;
   font-size: 25px;
   text-align: center;
   line-height: 500px;
  }

  .button{
   margin-top: 30px;
  }

  button{
   padding: 15px 25px;
   background-color: antiquewhite;
   border: none;
   border-radius: 10px;
   margin-right: 10px;
   cursor: pointer;
   font-size: 16px;
  }

  #homepage{
   position: absolute;
   margin-left: 30px;
   padding: 12px 20px;
   background: #a9abd8;
   border-radius: 20px;
   text-decoration: none;
   color: black;
   font-size: 18px;
  }

 </style>
</head>

<body>

 <div class="container">

  <div class="red-box">Red Box</div>

  <div class="blue-box">Blue Box</div>

  <div class="green-box">Green Box</div>

  <div class="yellow-box">Yellow Box</div>

 </div>

 <div class="button">

  <button id="red">Red Layer</button>

  <button id="green">Green Layer</button>

  <button id="Blue">Blue Layer</button>

  <button id="yellow">Yellow Layer</button>

  <a id="homepage" href="https://manoharreddyms07-creator.github.io/sem4-fet/">
    
   Home Page
  </a>

 </div>

 <script>

  let layer1 = document.querySelector(".red-box");
  let layer2 = document.querySelector(".green-box");
  let layer3 = document.querySelector(".blue-box");
  let layer4 = document.querySelector(".yellow-box");

  let topZ = 5;

  function swapLayer(color){

   let selectedLayer;

   if(color === "red"){
    selectedLayer = layer1;
   }

   else if(color === "green"){
    selectedLayer = layer2;
   }

   else if(color === "blue"){
    selectedLayer = layer3;
   }

   else if(color === "yellow"){
    selectedLayer = layer4;
   }

   topZ++;

   selectedLayer.style.zIndex = topZ;
  }

  document.getElementById("red").onclick = function(){
   swapLayer("red");
  }

  document.getElementById("green").onclick = function(){
   swapLayer("green");
  }

  document.getElementById("Blue").onclick = function(){
   swapLayer("blue");
  }

  document.getElementById("yellow").onclick = function(){
   swapLayer("yellow");
  }

 </script>

</body>
</html>
