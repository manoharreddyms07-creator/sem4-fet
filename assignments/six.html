<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Skills</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#ddd3e8;
            font-family:Arial, sans-serif;
        }

        h1{
            text-align:center;
            color:#5b21b6;
            font-size:60px;
            margin-top:25px;
        }

        .container{
            width:70%;
            margin:30px auto;
            background:#f2f2f2;
            border-radius:20px;
            padding:30px;
            font-size:22px;
        }

        ol{
            padding-left:30px;
        }

        ul{
            margin-top:10px;
            margin-bottom:10px;
        }

        li{
            margin:8px 0;
        }

        .list-btn{
            margin-left:20px;
            margin-top:20px;
            background:#6d28d9;
            color:white;
            border:none;
            padding:10px 20px;
            font-size:22px;
            cursor:pointer;
        }

    </style>
</head>

<body>

    <h1>Technical Skills</h1>

    <div class="container">

        <ol>

            <li>
                Programming Languages
                <ul>
                    <li>C</li>
                    <li>Python</li>
                    <li>Java</li>
                </ul>
            </li>

            <li>
                Tools & Technologies
                <ul>
                    <li>Visual Studio Code</li>
                    <li>Git</li>
                    <li>Linux</li>
                </ul>
            </li>

            <li>
                Core Computer Science
                <ul>
                    <li>Programming</li>
                    <li>Data Structures</li>
                    <li>Algorithms</li>
                </ul>
            </li>

        </ol>

    </div>

    <button class="list-btn">LIST</button>

</body>
</html>
